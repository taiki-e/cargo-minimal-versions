name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 10
  CARGO_MINIMAL_VERSIONS_DENY_WARNINGS: 1

defaults:
  run:
    shell: bash --noprofile --norc -CeEuxo pipefail {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  tidy:
    uses: taiki-e/github-actions/.github/workflows/tidy.yml@1bb80ca038216cd1fb7b6ca6d76240b3772963ab # main
    permissions:
      security-events: write # for github/codeql-action/*
  miri:
    needs: tidy
    uses: taiki-e/github-actions/.github/workflows/rust-miri.yml@1bb80ca038216cd1fb7b6ca6d76240b3772963ab # main
  msrv:
    needs: tidy
    uses: taiki-e/github-actions/.github/workflows/rust-msrv.yml@1bb80ca038216cd1fb7b6ca6d76240b3772963ab # main
  release-dry-run:
    needs: tidy
    uses: taiki-e/github-actions/.github/workflows/rust-release-dry-run.yml@1bb80ca038216cd1fb7b6ca6d76240b3772963ab # main

  test:
    needs: tidy
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust: stable
          - rust: beta
          - rust: nightly
          - rust: nightly
            os: macos-latest
          - rust: nightly
            os: windows-latest
    runs-on: ${{ matrix.os || 'ubuntu-24.04' }}
    timeout-minutes: 60
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
        with:
          tool: rust@${{ matrix.rust }},cargo-hack,cargo-minimal-versions
          fallback: none
      - run: cargo test --workspace --all-features
      - run: cargo hack build --workspace --no-private --feature-powerset --no-dev-deps
      - run: cargo minimal-versions build --workspace --no-private --detach-path-deps=skip-exact --all-features
      - run: cargo minimal-versions build --workspace --no-private --detach-path-deps=skip-exact --all-features --direct
      - run: cargo install -f --path . --debug
      - run: cargo minimal-versions check --workspace --no-private --detach-path-deps=skip-exact --all-features -v
      - run: cargo minimal-versions build --workspace --no-private --detach-path-deps=skip-exact --all-features -v
      - run: cargo minimal-versions build --workspace --no-private --detach-path-deps=skip-exact --all-features -v --direct
      - run: cargo minimal-versions test --workspace --all-features -v
      - run: |
          retry() {
            for i in {1..10}; do
              if "$@"; then
                return 0
              else
                sleep "${i}"
              fi
            done
            "$@"
          }
          retry git clone --depth 1 https://github.com/taiki-e/portable-atomic.git
          cd -- portable-atomic
          toolchain=1.34
          if [[ "$(uname -s)" == 'Darwin' ]]; then
            toolchain=1.54 # https://github.com/rust-lang/rust/issues/105167
          fi
          retry rustup toolchain add "${toolchain}" --no-self-update
          RUSTC_BOOTSTRAP=1 cargo +"${toolchain}" minimal-versions build --workspace --no-private -v
          RUSTC_BOOTSTRAP=1 cargo +"${toolchain}" minimal-versions build --workspace --no-private --detach-path-deps=all -v
        if: startsWith(matrix.rust, 'nightly')

  test-no-rustup:
    name: test (no rustup)
    needs: tidy
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    container: alpine
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - name: Install Rust
        run: apk --no-cache add cargo
      - uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
        with:
          tool: cargo-hack
          fallback: none
      - run: cargo test --workspace --all-features
      - run: cargo install -f --path . --debug
      - run: cargo minimal-versions check --workspace --no-private --detach-path-deps=skip-exact --all-features -v
      - run: cargo minimal-versions build --workspace --no-private --detach-path-deps=skip-exact --all-features -v
      - run: cargo minimal-versions build --workspace --no-private --detach-path-deps=skip-exact --all-features -v --direct
      - run: cargo minimal-versions test --workspace --all-features -v
